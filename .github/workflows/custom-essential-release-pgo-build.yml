name: custom-release-pgo-build
# on: workflow_dispatch
on: push

jobs:
  tag:
    runs-on: "ubuntu-latest"
    outputs:
      repo: ${{ steps.generate-repo.outputs.repo }}
      version: ${{ steps.generate-version.outputs.version }}
      tag: ${{ steps.generate-tag.outputs.tag }}
      sha: ${{ steps.generate-sha.outputs.sha }}
    steps:
    - id: generate-repo
      run: echo repo=https://github.com/nekotrix/SVT-AV1-Essential.git >> "$GITHUB_OUTPUT"
    - id: generate-version
      run: echo version=v4.0.1-Essential >> "$GITHUB_OUTPUT"
    - run: git clone --depth 1 ${{ steps.generate-repo.outputs.repo }} --branch ${{ steps.generate-version.outputs.version }} --single-branch .
    - id: generate-tag
      run: echo tag=pgo-build-$(git log -1 "--date=format:%F" "--format=%ad-%h") >> "$GITHUB_OUTPUT"
    - id: generate-sha
      run: echo sha=$(git log -1 "--format=%H") >> "$GITHUB_OUTPUT"


  release:
    needs: tag
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v7
    - run: GH_TOKEN=${{ github.token }} gh release delete ${{ needs.tag.outputs.tag }} --cleanup-tag
      continue-on-error: true
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        target_commitish: pgo-build-tags
        name: SVT-AV1-Essential ${{ needs.tag.outputs.version }}
        body: |
          Release `${{ needs.tag.outputs.version }}` | Commit `${{ needs.tag.outputs.sha }}` | WEBM | FFMS2  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `icelake-server` + `znver5` | LTO PGO  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `znver2` | LTO PGO  
          Windows | x86-64 | LLVM Project Clang LLD | winthread | `x86-64-v3` + `znver2` | LTO PGO  
          Windows | arm64 | LLVM Project Clang LLD | winthread | `armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2` + `oryon-1` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `icelake-server` + `znver5` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `znver2` | LTO PGO  
          Linux | x86-64 | LLVM Project Clang LLD | `x86-64-v3` + `znver2` | LTO PGO  
          macOS | arm64 | LLVM Project Clang LLD | `armv8.5-a+simd+crypto` + `apple-m3` | LTO PGO  
          macOS | x86-64 | LLVM Project Clang LLD | `skylake` | LTO PGO  

          On Windows, FFMS2 is built into the binary and is always available.  
          On Linux and macOS, if you want to use FFMS2, in addition to downloading the FFMS2 version, you need to install `ffms2` from your system package manager. For people that only uses pipe input, you can grab the non-FFMS2 version.  

          On x86-64 systems, no matter if you're on an Intel or AMD system, you should try these builds in the order of `icelake-server` + `znver5` ⇒ `znver2` ⇒ `x86-64-v3` + `znver2`.  
          If your CPU doesn't support the features required by the `icelake-server` + `znver5` version, often indicated by crashing outright when attempting to make any encodes, you can try the `znver2` version and see if that works. If not, then the `x86-64-v3` + `znver2` version, which should always work on any modern systems.  
          Some versions might not be available if the GitHub Actions runners we get this time don't support the respective features.  

          Thanks to studies and contributions from afed, Emre, Ironclad, Itachi Uchiha, Khaoklong, Miss Ashenlight, Soda, SwareJonge, Trix, Yiss, and other people in the community for discovering the method to build the fastest binary.  
        prerelease: false
        make_latest: "false"


  build-windows-x86-64:
    needs: [tag, release]
    runs-on: "windows-latest"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - run: git clone ${{ needs.tag.outputs.repo }} --branch ${{ needs.tag.outputs.version }} --single-branch .
      shell: pwsh

    - uses: Akatmks/build-svt-av1@v1
      with:
        dovi-hdr10plus: "false"
        ffms2: "true"
        cmakeflags: "-DUSE_WEBM_IO=ON -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"

    - id: detect-icelake-server-znver5
      run: ls BuildAction/icelake-server+znver5/static/ffms2/SvtAv1EncApp.exe
      continue-on-error: true
    - run: cd BuildAction/icelake-server+znver5/static/ffms2 && tar cJf Windows_x86-64_ffms2_icelake-server+znver5.tar.xz SvtAv1EncApp.exe
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/icelake-server+znver5/static/ffms2/Windows_x86-64_ffms2_icelake-server+znver5.tar.xz
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}

    - id: detect-znver2
      run: ls BuildAction/znver2/static/ffms2/SvtAv1EncApp.exe
      continue-on-error: true
    - run: cd BuildAction/znver2/static/ffms2 && tar cJf Windows_x86-64_ffms2_znver2.tar.xz SvtAv1EncApp.exe
      if: ${{ steps.detect-znver2.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/znver2/static/ffms2/Windows_x86-64_ffms2_znver2.tar.xz
      if: ${{ steps.detect-znver2.outcome != 'failure' }}

    - run: ls BuildAction/x86-64-v3+znver2/static/ffms2/SvtAv1EncApp.exe
    - run: cd BuildAction/x86-64-v3+znver2/static/ffms2 && tar cJf Windows_x86-64_ffms2_x86-64-v3+znver2.tar.xz SvtAv1EncApp.exe
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/x86-64-v3+znver2/static/ffms2/Windows_x86-64_ffms2_x86-64-v3+znver2.tar.xz


  build-windows-arm64:
    needs: [tag, release]
    runs-on: "windows-11-arm"
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - run: git clone ${{ needs.tag.outputs.repo }} --branch ${{ needs.tag.outputs.version }} --single-branch .
      shell: pwsh

    - uses: Akatmks/build-svt-av1@v1
      with:
        dovi-hdr10plus: "false"
        ffms2: "true"
        cmakeflags: "-DUSE_WEBM_IO=ON -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"

    - run: ls BuildAction/armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1/static/ffms2/SvtAv1EncApp.exe
    - run: cd BuildAction/armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1/static/ffms2 && tar cJf Windows_arm64_armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1.tar.xz SvtAv1EncApp.exe
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1/static/ffms2/Windows_arm64_armv8.7-a+crypto+sm4+sha3+fp16+sve+sve2+oryon-1.tar.xz


  build-linux-x86-64:
    needs: [tag, release]
    runs-on: "ubuntu-latest"
    steps:
    - run: git clone ${{ needs.tag.outputs.repo }} --branch ${{ needs.tag.outputs.version }} --single-branch .

    - uses: Akatmks/build-svt-av1@v1
      with:
        dovi-hdr10plus: "false"
        ffms2: "true"
        cmakeflags: "-DUSE_WEBM_IO=ON"

    - id: detect-icelake-server-znver5
      run: ls BuildAction/icelake-server+znver5/static/base/SvtAv1EncApp
      continue-on-error: true
    - run: cd BuildAction/icelake-server+znver5/static/base && tar cJf Linux_x86-64_icelake-server+znver5.tar.xz SvtAv1EncApp
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/icelake-server+znver5/static/base/Linux_x86-64_icelake-server+znver5.tar.xz
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}

    - id: detect-znver2
      run: ls BuildAction/znver2/static/base/SvtAv1EncApp
      continue-on-error: true
    - run: cd BuildAction/znver2/static/base && tar cJf Linux_x86-64_znver2.tar.xz SvtAv1EncApp
      if: ${{ steps.detect-znver2.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/znver2/static/base/Linux_x86-64_znver2.tar.xz
      if: ${{ steps.detect-znver2.outcome != 'failure' }}
    
    - run: ls BuildAction/x86-64-v3+znver2/static/base/SvtAv1EncApp
    - run: cd BuildAction/x86-64-v3+znver2/static/base && tar cJf Linux_x86-64_x86-64-v3+znver2.tar.xz SvtAv1EncApp
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/x86-64-v3+znver2/static/base/Linux_x86-64_x86-64-v3+znver2.tar.xz
  
    - run: ls BuildAction/icelake-server+znver5/static/ffms2/SvtAv1EncApp
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}
    - run: cd BuildAction/icelake-server+znver5/static/ffms2 && tar cJf Linux_x86-64_ffms2_icelake-server+znver5.tar.xz SvtAv1EncApp
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/icelake-server+znver5/static/ffms2/Linux_x86-64_ffms2_icelake-server+znver5.tar.xz
      if: ${{ steps.detect-icelake-server-znver5.outcome != 'failure' }}

    - run: ls BuildAction/znver2/static/ffms2/SvtAv1EncApp
      if: ${{ steps.detect-znver2.outcome != 'failure' }}
    - run: cd BuildAction/znver2/static/ffms2 && tar cJf Linux_x86-64_ffms2_znver2.tar.xz SvtAv1EncApp
      if: ${{ steps.detect-znver2.outcome != 'failure' }}
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/znver2/static/ffms2/Linux_x86-64_ffms2_znver2.tar.xz
      if: ${{ steps.detect-znver2.outcome != 'failure' }}

    - run: ls BuildAction/x86-64-v3+znver2/static/ffms2/SvtAv1EncApp
    - run: cd BuildAction/x86-64-v3+znver2/static/ffms2 && tar cJf Linux_x86-64_ffms2_x86-64-v3+znver2.tar.xz SvtAv1EncApp
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/x86-64-v3+znver2/static/ffms2/Linux_x86-64_ffms2_x86-64-v3+znver2.tar.xz


  build-macos-arm64:
    needs: [tag, release]
    runs-on: "macos-latest"
    steps:
    - run: git clone ${{ needs.tag.outputs.repo }} --branch ${{ needs.tag.outputs.version }} --single-branch .

    - uses: Akatmks/build-svt-av1@v1
      with:
        dovi-hdr10plus: "false"
        ffms2: "true"
        cmakeflags: "-DUSE_WEBM_IO=ON"

    - run: ls BuildAction/armv8.5-a+simd+crypto+apple-m3/static/base/SvtAv1EncApp
    - run: cd BuildAction/armv8.5-a+simd+crypto+apple-m3/static/base && tar cJf macOS_arm64_armv8.5-a+simd+crypto+apple-m3.tar.xz SvtAv1EncApp
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/armv8.5-a+simd+crypto+apple-m3/static/base/macOS_arm64_armv8.5-a+simd+crypto+apple-m3.tar.xz

    - run: ls BuildAction/armv8.5-a+simd+crypto+apple-m3/static/ffms2/SvtAv1EncApp
    - run: cd BuildAction/armv8.5-a+simd+crypto+apple-m3/static/ffms2 && tar cJf macOS_arm64_ffms2_armv8.5-a+simd+crypto+apple-m3.tar.xz SvtAv1EncApp
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/armv8.5-a+simd+crypto+apple-m3/static/ffms2/macOS_arm64_ffms2_armv8.5-a+simd+crypto+apple-m3.tar.xz


  build-macos-x86-64:
    needs: [tag, release]
    runs-on: "macos-26-intel"
    steps:
    - run: git clone ${{ needs.tag.outputs.repo }} --branch ${{ needs.tag.outputs.version }} --single-branch .

    - uses: Akatmks/build-svt-av1@v1
      with:
        dovi-hdr10plus: "false"
        ffms2: "true"
        cmakeflags: "-DUSE_WEBM_IO=ON"

    - run: ls BuildAction/skylake/static/base/SvtAv1EncApp
    - run: cd BuildAction/skylake/static/base && tar cJf macOS_x86-64_skylake.tar.xz SvtAv1EncApp
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/skylake/static/base/macOS_x86-64_skylake.tar.xz

    - run: ls BuildAction/skylake/static/ffms2/SvtAv1EncApp
    - run: cd BuildAction/skylake/static/ffms2 && tar cJf macOS_x86-64_ffms2_skylake.tar.xz SvtAv1EncApp
    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.tag.outputs.tag }}
        files: BuildAction/skylake/static/ffms2/macOS_x86-64_ffms2_skylake.tar.xz